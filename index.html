    const ScrollReveal = ({ children, delay = 0, className = '' }) => {
      const [isVisible, setIsVisible] = useState(false);
      const domRef = useRef();

      useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        if (domRef.current) observer.observe(domRef.current);
        return () => observer.disconnect();
      }, []);

      return (
        <div
          ref={domRef}
          className={`transition-all duration-700 ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'} ${className}`}
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </div>
      );

          const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
          let result = '';
          for (let i = 0; i < 5; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
          }
          return `SRL-${result}`;
        };
        setTransactionCode(generateCode());
      }, []);

      useEffect(() => {
        if (!showQrisModal) return;
        const timer = setInterval(() => {
          setTimeLeft(prev => (prev > 0 ? prev - 1 : 0));
        }, 1000);
        return () => clearInterval(timer);
      }, [showQrisModal]);

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      const handleCopy = () => {
        const textArea = document.createElement("textarea");
        textArea.value = transactionCode;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('Copy failed', err);
        }
        document.body.removeChild(textArea);
      };

      const toggleSection = (section) => {
        setOpenSection(openSection === section ? null : section);
      };

      const handleDownloadQris = async () => {
        try {
          const response = await fetch(qrisBase64);
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = 'QRIS-Soralink.jpg';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          window.URL.revokeObjectURL(url);
        } catch (error) {
          window.open(qrisBase64, '_blank');
        }
      };

      const getBasePrice = () => {
        if (product.priceMap) {
          if (product.priceMap[selectedVariant] && product.priceMap[selectedVariant][selectedDuration]) {
            return product.priceMap[selectedVariant][selectedDuration];
          }
          if (product.priceMap[selectedDuration]) {
            return product.priceMap[selectedDuration];
          }
        }
        const durationMultiplier = parseInt(selectedDuration) || 1;
        return product.priceRaw * durationMultiplier;
      };

      const finalPrice = getBasePrice() * qty;
      const isCurrentlySoldOut = product.disabledDurations && product.disabledDurations[selectedVariant] && product.disabledDurations[selectedVariant].includes(selectedDuration);
      const waSuccessUrl = `https://wa.me/6289685166109?text=${encodeURIComponent(`Halo kak, saya sudah melakukan pembayaran.\n\nProduk: ${selectedVariant}\nDurasi: ${selectedDuration}\nHarga: ${formatRupiah(finalPrice)}\nKode Transaksi: ${transactionCode}\n\nMohon untuk segera diproses ya, terima kasih! ☺️`)}`;

      const AccordionItem = ({ id, title, children }) => {

            <button

                        {openDropdown === 'duration' && (

                            <div className="absolute right-0 top-full mt-2 w-max min-w-[150px] bg-white border border-neutral-200 rounded-xl shadow-xl z-50 overflow-hidden">
                              {product.durations.map(d => {
                                const isDisabled = product.disabledDurations && product.disabledDurations[selectedVariant] && product.disabledDurations[selectedVariant].includes(d);
                                return (
                                  <button
                                    key={d}
                                    onClick={() => { if (isDisabled) return; setSelectedDuration(d); setOpenDropdown(null); }}
                                    disabled={isDisabled}
                                    className={`w-full flex justify-between items-center gap-3 text-left px-4 py-3 text-xs md:text-sm font-medium transition-colors ${isDisabled ? 'cursor-not-allowed' : `hover:bg-neutral-50 ${selectedDuration === d ? 'text-black bg-neutral-50' : 'text-neutral-500'}`}`}
                                  >
                                    <span className={isDisabled ? 'line-through text-neutral-400 opacity-60' : ''}>{d}</span>
                                    {isDisabled && <span className="text-[8px] bg-neutral-100 border border-neutral-200 text-neutral-400 px-1.5 py-0.5 rounded-sm uppercase tracking-wider">Sold Out</span>}
                                  </button>
                                );
                              })}
                            </div>
                          </>
                        )}
                      </div>
                    ) : (
                      <div className="flex items-center gap-1.5 text-right">
                        <span className={`text-black font-bold text-xs md:text-sm ${isCurrentlySoldOut ? 'line-through text-neutral-400' : ''}`}>{selectedDuration}</span>
                        {isCurrentlySoldOut && <span className="text-[8px] bg-neutral-200 text-neutral-500 px-1 py-0.5 rounded uppercase tracking-wider">Sold Out</span>}
                      </div>
                    )}
                  </div>
                  
                  <div className="flex justify-between items-center pb-1">
                    <span className="text-black font-medium text-xs md:text-sm">Kode Transaksi</span>
                    <div className="flex items-center gap-2">
                      <span className="text-white bg-black font-mono font-bold tracking-widest text-sm md:text-base px-2 py-0.5 rounded-md">{transactionCode}</span>
                      <button onClick={handleCopy} className="p-1.5 hover:bg-neutral-100 rounded-md transition-colors text-neutral-600 hover:text-black" title="Salin Kode">
                        {copied ? <Check className="w-4 h-4 text-green-500" /> : <Copy className="w-4 h-4" />}
                      </button>
                    </div>
                  </div>
                </div>

                <div className="flex justify-between items-end border-t border-white/10 pt-4">
                  <span className="text-neutral-400 font-medium">Total Biaya</span>
                  <div className="text-right">
                    <div className="text-xl md:text-2xl font-bold text-white tracking-tight">{formatRupiah(finalPrice)}</div>
                  </div>
                </div>

                <button 
                  onClick={() => { if (!isCurrentlySoldOut) setShowQrisModal(true) }}
                  disabled={isCurrentlySoldOut}
                  className={`w-full mt-2 py-4 rounded-xl transition-all duration-300 font-bold tracking-wide flex justify-center items-center gap-2 ${isCurrentlySoldOut ? 'bg-neutral-300 text-neutral-500 cursor-not-allowed' : 'bg-white text-black hover:bg-neutral-200 shadow-[0_0_20px_rgba(255,255,255,0.1)]'}`}
                >
                  {isCurrentlySoldOut ? 'Sold Out' : <><QrCode className="w-5 h-5" /> Bayar dengan QRIS</>}
                </button>
              </div>
            </div>
          </ScrollReveal>

          {/* Modal QRIS */}
          {showQrisModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
              <div className="bg-black/60 backdrop-blur-2xl border border-white/10 rounded-3xl w-full max-w-sm p-5 md:p-6 flex flex-col items-center relative shadow-[0_8px_32px_rgba(0,0,0,0.5)] max-h-[90vh] overflow-y-auto">
                <p className="text-[10px] md:text-xs font-bold text-neutral-400 mb-3">Selesaikan pembayaran dalam {formatTime(timeLeft)}</p>
                <div className="bg-white/90 p-2 rounded-xl border border-white/20 mb-3 shadow-sm w-full flex justify-center">
                  <img src={qrFailed ? "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=SORALINK-PAYMENT" : qrisBase64} alt="QRIS" className="w-full max-w-[180px] md:max-w-[200px] aspect-square object-contain" onError={(e) => { e.currentTarget.onerror = null; setQrFailed(true); }} />
                </div>
                <button onClick={handleDownloadQris} className="flex items-center gap-2 px-4 py-1.5 bg-white/10 hover:bg-white/20 border border-white/10 rounded-lg text-[10px] font-bold text-neutral-300 transition-colors mb-3 shadow-sm">
                  <Download className="w-3.5 h-3.5" /> Unduh QRIS
                </button>
                <div className="text-center mb-3 w-full">
                  <p className="text-[10px] md:text-xs font-bold text-neutral-400 mb-0.5">Scan QR & masukkan nominal</p>
                  <p className="text-xl font-black text-white tracking-tight">{formatRupiah(finalPrice)}</p>
                </div>
                <div className="bg-white/5 p-3 rounded-xl w-full border border-white/10 flex flex-col gap-1 mb-4 text-[10px] md:text-xs shadow-sm">
                  <div className="flex gap-2"><span className="text-neutral-400 font-medium w-14">Produk:</span><span className="text-neutral-100 font-bold">{selectedVariant}</span></div>
                  <div className="flex gap-2"><span className="text-neutral-400 font-medium w-14">Durasi:</span><span className="text-neutral-100">{selectedDuration}</span></div>
                  <div className="flex gap-2"><span className="text-neutral-400 font-medium w-14">Kode:</span><span className="text-neutral-100 font-mono font-bold tracking-widest">{transactionCode}</span></div>
                </div>
                <button 
                  onClick={() => {
                    if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(200);
                    setShowQrisModal(false); setShowSuccessModal(true);
                    onSuccess({ id: transactionCode, title: selectedVariant, price: finalPrice, duration: selectedDuration, date: new Date().toISOString(), status: 'Berhasil' });
                  }}
                  className="w-full py-3 rounded-xl bg-white text-black hover:bg-neutral-200 shadow-xl transition-colors text-sm font-bold tracking-wide"
                >Saya Sudah Bayar</button>
                <button onClick={() => setShowQrisModal(false)} className="absolute top-4 right-4 text-neutral-400 hover:text-white transition-colors bg-white/5 p-1 rounded-full backdrop-blur-md">

    function TransactionHistory({ history, onBack }) {
      const [filterDate, setFilterDate] = useState('');
      const filteredHistory = filterDate
        ? history.filter(trx => {
            const d = new Date(trx.date);
            const formattedDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            return formattedDate === filterDate;

        : history;

      return (
        <div className="relative z-10 max-w-3xl mx-auto px-4 md:px-6 pt-28 pb-32 min-h-screen">

          <div className="space-y-4">
            {filteredHistory.length === 0 ? (
              <ScrollReveal delay={100}>

              </ScrollReveal>
            ) : (
              filteredHistory.map((trx, idx) => {
                const matchedProduct = products.find(p => p.title === trx.title || (p.variants && p.variants.includes(trx.title)));
                return (
                  <ScrollReveal key={trx.id} delay={100 + (idx * 50)}>

                      <div className="flex justify-between items-start gap-3 border-b border-white/10 pb-3 md:pb-4">
